version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: bridge-postgres
    environment:
      POSTGRES_USER: bridge_user
      POSTGRES_PASSWORD: secure_password_123
      POSTGRES_DB: bridge_fhir_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bridge-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bridge_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bridge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - bridge-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bridge-api
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: bridge_user
      DB_PASSWORD: secure_password_123
      DB_NAME: bridge_fhir_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - bridge-network

  nginx:
    image: nginx:alpine
    container_name: bridge-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - bridge-network

volumes:
  postgres_data:
  redis_data:

networks:
  bridge-network:
    driver: bridge
